<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PIXEL DUEL</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#0d0820; }
canvas { display:block; }

/* ── LEVEL SELECT ── */
#level-select {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#0d0820; z-index:20;
}
#level-select h1 {
  font-family:monospace; font-size:36px; font-weight:bold;
  color:#FFD700; letter-spacing:6px;
  text-shadow:4px 4px 0 #8B6914,8px 8px 0 #000;
  margin-bottom:10px;
}
#level-select p {
  font-family:monospace; font-size:12px; color:#666;
  margin-bottom:48px; letter-spacing:2px;
}
.level-cards {
  display:flex; gap:32px;
}
.level-card {
  width:200px; cursor:pointer;
  border:3px solid #333; background:#12102a;
  padding:0 0 20px 0; transition:border-color 0.15s, transform 0.15s;
  font-family:monospace;
}
.level-card:hover { border-color:#FFD700; transform:translateY(-6px); }
.level-card canvas { width:200px; height:120px; display:block; image-rendering:pixelated; }
.level-card h2 { font-size:13px; color:#FFD700; text-align:center; margin:14px 0 6px; letter-spacing:2px; }
.level-card p  { font-size:9px;  color:#888;    text-align:center; line-height:1.6; padding:0 12px; }

/* ── GAME UI ── */
#ui {
  position:absolute; top:38%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center; display:none; z-index:10;
}
#result {
  font-size:40px; color:#FFD700;
  text-shadow:4px 4px 0 #8B6914,8px 8px 0 #000;
  letter-spacing:4px; margin-bottom:24px;
  font-family:monospace; font-weight:bold;
  animation:blink 0.7s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.ui-btn {
  font-size:14px; padding:12px 28px; margin:6px;
  border:3px solid #FFD700; background:#0d0820;
  color:#FFD700; cursor:pointer; font-family:monospace; font-weight:bold;
}
.ui-btn:hover{background:#FFD700;color:#0d0820;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- LEVEL SELECT -->
<div id="level-select">
  <h1>PIXEL DUEL</h1>
  <p>CHOOSE YOUR BATTLEFIELD</p>
  <div class="level-cards">
    <div class="level-card" onclick="startGame(1)">
      <canvas id="prev1" width="200" height="120"></canvas>
      <h2>WILD WEST</h2>
      <p>Desert night. Clouds bounce bullets skyward.</p>
    </div>
    <div class="level-card" onclick="startGame(2)">
      <canvas id="prev2" width="200" height="120"></canvas>
      <h2>NEON CITY</h2>
      <p>Street lamps and neon signs deflect your shots.</p>
    </div>
    <div class="level-card" onclick="startGame(3)">
      <canvas id="prev3" width="200" height="120"></canvas>
      <h2>MARS</h2>
      <p>Red planet. Alien ships patrol the sky and ricochet bullets.</p>
    </div>
  </div>
</div>

<!-- GAME OVER UI -->
<div id="ui">
  <div id="result">VICTORY</div>
  <button class="ui-btn" id="menu-btn" onclick="location.reload()">MENU</button>
  <button class="ui-btn" id="retry-btn" onclick="restartLevel()">RETRY</button>
</div>

<script>
const canvas  = document.getElementById('game')
const ctx     = canvas.getContext('2d')
const ui      = document.getElementById('ui')
const resultEl= document.getElementById('result')
const levelSel= document.getElementById('level-select')
ctx.imageSmoothingEnabled = false
canvas.width  = window.innerWidth
canvas.height = window.innerHeight

const W = canvas.width
const H = canvas.height
const GROUND = H - 110
const SPRITE_GROUND = GROUND - 68

function R(n){ return Math.round(n) }

// ── CURRENT LEVEL ───────────────────────────────────────────
let currentLevel = 0

// ── STATE ────────────────────────────────────────────────────
let timeScale=1, slowEnergy=1, isSlowmo=false, gameOver=false
let slowmoGlowAlpha=0
let bullets=[], particles=[], flashes=[], keys={}
const SLOW_DRAIN=0.007, SLOW_REFILL=0.003, SLOW_SCALE=0.22

// ── STARS ────────────────────────────────────────────────────
const stars = Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H*0.55,s:Math.random()<0.3?2:1,b:Math.random()}))
const marsStars = Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H*0.6,s:Math.random()<0.2?2:1,b:Math.random()}))

// ── OBSTACLES (deflect bullets) ──────────────────────────────
// {x,y,w,h} axis-aligned rects that bullets bounce off
let obstacles = []

// ── CLOUDS (level 1) ─────────────────────────────────────────
class Cloud {
  constructor(x,y,rx,ry,speed){
    this.x=x; this.y=y; this.rx=rx; this.ry=ry; this.speed=speed
    this.holes=[]
    // pre-generate lobes relative to cloud centre
    this.lobes=this._makeLobes(rx,ry)
    // cached pixel list built once — stable grid
    this._cache=null; this._cacheX=null
  }
  _makeLobes(rx,ry){
    return [
      {ox:0,        oy:0,        rx:rx,       ry:ry},
      {ox:-rx*0.45, oy:-ry*0.45, rx:rx*0.275, ry:ry*0.275},
      {ox: rx*0.40, oy:-ry*0.40, rx:rx*0.333, ry:ry*0.333},
    ]
  }
  inCloud(lx,ly){
    for(let l of this.lobes){
      let dx=lx-l.ox, dy=ly-l.oy
      if((dx*dx)/(l.rx*l.rx)+(dy*dy)/(l.ry*l.ry)<=1) return true
    }
    return false
  }
  // brightness 0-1 based on distance from centre of main lobe
  _shade(lx,ly){
    let d=Math.sqrt((lx*lx)/(this.rx*this.rx)+(ly*ly)/(this.ry*this.ry))
    return Math.max(0,1-d*0.45)
  }
  contains(wx,wy){ return this.inCloud(wx-this.x, wy-this.y) }
  addHole(wx,wy){ this.holes.push({lx:wx-this.x, ly:wy-this.y, r:6+Math.random()*5}) }
  _buildCache(){
    // Build pixel list on a grid anchored to integer multiples — independent of x position
    const BL=4
    let pixels=[]
    let ext=this.rx+this.lobes.reduce((m,l)=>Math.max(m,Math.abs(l.ox)+l.rx),0)
    let eyt=this.ry+this.lobes.reduce((m,l)=>Math.max(m,Math.abs(l.oy)+l.ry),0)
    let x0=-Math.ceil(ext/BL)*BL, y0=-Math.ceil(eyt/BL)*BL
    let x1= Math.ceil(ext/BL)*BL, y1= Math.ceil(this.ry/BL)*BL
    for(let py=y0; py<y1; py+=BL){
      for(let px=x0; px<x1; px+=BL){
        let lx=px+BL/2, ly=py+BL/2
        if(!this.inCloud(lx,ly)) continue
        let v=Math.floor(200+this._shade(lx,ly)*55)
        pixels.push({px,py,v})
      }
    }
    this._cache=pixels
  }
  draw(){
    if(!this._cache) this._buildCache()
    const BL=4
    // use real float position via translate — smooth movement, no pixel jitter
    ctx.save()
    ctx.translate(Math.round(this.x), Math.round(this.y))
    for(let p of this._cache){
      let lx=p.px+BL/2, ly=p.py+BL/2
      let inHole=false
      for(let h of this.holes){
        let ddx=lx-h.lx, ddy=ly-h.ly
        if(ddx*ddx+ddy*ddy<h.r*h.r){inHole=true;break}
      }
      if(inHole) continue
      ctx.fillStyle='rgb('+p.v+','+p.v+','+p.v+')'
      ctx.fillRect(p.px, p.py, BL, BL)
    }
    // dark ring around holes (in local coords)
    for(let h of this.holes){
      for(let a=0; a<Math.PI*2; a+=0.35){
        let ex=Math.floor((h.lx+Math.cos(a)*(h.r+2))/BL)*BL
        let ey=Math.floor((h.ly+Math.sin(a)*(h.r+2))/BL)*BL
        if(!this.inCloud(ex,ey)) continue
        ctx.fillStyle='rgba(60,40,20,0.45)'; ctx.fillRect(ex,ey,BL,BL)
      }
    }
    ctx.restore()
  }
  update(dt){
    this.x+=this.speed*dt*timeScale
    if(this.speed>0&&this.x-this.rx>W+50) this.x=-this.rx-50
    if(this.speed<0&&this.x+this.rx<-50)  this.x=W+this.rx+50
  }
}

let clouds=[]

// ── ALIENS (level 3) ─────────────────────────────────────────
class Alien {
  constructor(x,y,speed){
    this.x=x; this.y=y; this.speed=speed
    this.oy=y; this.phase=Math.random()*Math.PI*2
    this.w=120; this.h=60
  }
  update(dt){
    this.x+=this.speed*dt*timeScale
    this.y=this.oy+Math.sin(Date.now()*0.002+this.phase)*18
    if(this.speed>0&&this.x>W+160) this.x=-160
    if(this.speed<0&&this.x<-160)  this.x=W+160
    // sync obstacle
    this.obs.x=this.x; this.obs.y=this.y
  }
  draw(){
    let x=R(this.x),y=R(this.y)
    // body – pixel art saucer (2× scale)
    ctx.fillStyle='#44ee88'
    ctx.fillRect(x+20,y+20,80,28)  // main disc
    ctx.fillRect(x+36,y+4, 48,24)  // dome
    ctx.fillStyle='#22aa55'
    ctx.fillRect(x+20,y+20,80,8)   // shade
    // porthole lights
    let lt=Math.floor(Date.now()/300)%3
    let cols=['#ff4466','#ffdd00','#44aaff']
    for(let i=0;i<3;i++){
      ctx.fillStyle=lt===i?'#ffffff':cols[i]
      ctx.fillRect(x+32+i*24,y+26,12,12)
    }
    // glow
    ctx.globalAlpha=0.18
    ctx.fillStyle='#44ee88'
    ctx.fillRect(x+12,y+12,96,48)
    ctx.globalAlpha=1
    // beam
    if(Math.random()<0.05){
      ctx.globalAlpha=0.12
      ctx.fillStyle='#aaffaa'
      ctx.fillRect(x+48,y+48,24,120)
      ctx.globalAlpha=1
    }
  }
}

let aliens=[]

// ── PARTICLES ────────────────────────────────────────────────
class Particle {
  constructor(x,y,type,col){
    this.x=x;this.y=y;this.life=1;this.type=type
    let spd=type==='spark'?2+Math.random()*5:1+Math.random()*4
    let ang=Math.random()*Math.PI*2
    this.dx=Math.cos(ang)*spd;this.dy=Math.sin(ang)*spd
    this.size=type==='spark'?2:3+Math.random()*4
    this.color=col||(type==='spark'?(Math.random()<0.5?'#FFD700':'#FF8C00'):(Math.random()<0.5?'#FF4422':'#FF8844'))
  }
  update(dt){this.x+=this.dx*dt*timeScale;this.y+=this.dy*dt*timeScale;this.dy+=0.2*dt*timeScale;this.life-=0.045*dt*timeScale*(isSlowmo?0.2:1)}
  draw(){ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;ctx.fillRect(R(this.x),R(this.y),this.size,this.size);ctx.globalAlpha=1}
}
class Flash{
  constructor(x,y,col){this.x=x;this.y=y;this.life=1;this.col=col}
  update(dt){this.life-=0.18*dt*timeScale}
  draw(){if(this.life<=0)return;ctx.globalAlpha=this.life;ctx.fillStyle=this.col;let s=8+R(Math.random()*10);ctx.fillRect(R(this.x-s/2),R(this.y-s/2),s,s);ctx.globalAlpha=1}
}

// ── BLOOD ─────────────────────────────────────────────────────
let bloodStains=[], bloodDrops=[]

class BloodDrop{
  constructor(x,y,dirX){
    this.x=x;this.y=y
    let spread=0.8+Math.random()*0.6
    this.dx=-dirX*(2+Math.random()*5)*spread+(Math.random()-0.5)*3
    this.dy=-(3+Math.random()*7)
    this.size=1+Math.random()*3
    this.settled=false
  }
  update(dt){
    if(this.settled)return
    this.dy+=0.55*dt*timeScale
    this.x+=this.dx*dt*timeScale
    this.y+=this.dy*dt*timeScale
    for(let o of obstacles){
      if(this.x>=o.x&&this.x<=o.x+o.w&&this.y>=o.y&&this.y<=o.y+o.h){
        this.settled=true
        bloodStains.push({type:'obstacle',obs:o,rx:this.x-o.x,ry:this.y-o.y,size:this.size*1.4,alpha:0.6+Math.random()*0.4})
        return
      }
    }
    if(this.y>=GROUND-2){
      this.y=GROUND-2;this.settled=true
      bloodStains.push({type:'ground',x:this.x,y:this.y,size:this.size*1.6,alpha:0.7+Math.random()*0.3})
    }
  }
  draw(){
    if(this.settled)return
    ctx.globalAlpha=0.9;ctx.fillStyle='#cc0000'
    ctx.fillRect(R(this.x),R(this.y),R(this.size),R(this.size))
    ctx.globalAlpha=1
  }
}

function drawBloodStains(){
  for(let s of bloodStains){
    ctx.globalAlpha=s.alpha*0.85;ctx.fillStyle='#880000'
    if(s.type==='ground'){
      ctx.beginPath();ctx.ellipse(R(s.x),R(s.y),R(s.size*1.2),R(s.size*0.5),0,0,Math.PI*2);ctx.fill()
    } else {
      let wx=s.obs.x+s.rx,wy=s.obs.y+s.ry
      ctx.beginPath();ctx.arc(R(wx),R(wy),R(s.size),0,Math.PI*2);ctx.fill()
      ctx.fillRect(R(wx-s.size*0.3),R(wy),R(s.size*0.6),R(s.size*2))
    }
  }
  ctx.globalAlpha=1
}

// ── BULLET ───────────────────────────────────────────────────
class Bullet{
  constructor(x,y,angle,owner){
    this.x=x;this.y=y;this.owner=owner
    this.speed=4.9;this.dx=Math.cos(angle)*this.speed;this.dy=Math.sin(angle)*this.speed
    this.r=5;this.trail=[]
    this.pathTrail=[];this._pathD=0;this._sinceLastPt=0
  }
  update(dt){
    this.trail.push({x:this.x,y:this.y})
    if(this.trail.length>36)this.trail.shift()
    // path trail at full speed — one point per ~10px
    let fx=this.x+this.dx*dt, fy=this.y+this.dy*dt
    if(this.pathTrail.length>0){
      let prev=this.pathTrail[this.pathTrail.length-1]
      let ddx=fx-prev.x, ddy=fy-prev.y
      let step=Math.sqrt(ddx*ddx+ddy*ddy)
      this._pathD+=step
      this._sinceLastPt+=step
      if(this._sinceLastPt>=10){ this._sinceLastPt=0; this.pathTrail.push({x:fx,y:fy,d:this._pathD}) }
    } else {
      this._sinceLastPt=0; this.pathTrail.push({x:fx,y:fy,d:this._pathD})
    }
    while(this.pathTrail.length>1 && this._pathD-this.pathTrail[0].d>600) this.pathTrail.shift()
    let ts=timeScale*dt
    this.x+=this.dx*ts;this.y+=this.dy*ts
    // wall bounce
    if(this.x-this.r<0){this.x=this.r;this.dx=Math.abs(this.dx);spark(this.x,this.y)}
    if(this.x+this.r>W){this.x=W-this.r;this.dx=-Math.abs(this.dx);spark(this.x,this.y)}
    if(this.y-this.r<0){this.y=this.r;this.dy=Math.abs(this.dy);spark(this.x,this.y)}
    if(this.y+this.r>H){this.y=H-this.r;this.dy=-Math.abs(this.dy);spark(this.x,this.y)}
    // obstacle bounce
    for(let o of obstacles){
      if(this.x+this.r>o.x&&this.x-this.r<o.x+o.w&&this.y+this.r>o.y&&this.y-this.r<o.y+o.h){
        // figure out which axis to bounce
        let overlapL=this.x+this.r-o.x, overlapR=o.x+o.w-this.x+this.r
        let overlapT=this.y+this.r-o.y, overlapB=o.y+o.h-this.y+this.r
        let minH=Math.min(overlapL,overlapR), minV=Math.min(overlapT,overlapB)
        if(minH<minV){ this.dx*=-1; this.x+=this.dx>0?2:-2 }
        else         { this.dy*=-1; this.y+=this.dy>0?2:-2 }
        spark(this.x,this.y)
        break
      }
    }
    // clouds (level 1 only)
    for(let c of clouds) if(c.contains(this.x,this.y)) c.addHole(this.x,this.y)
  }
  draw(){
    let col = this.owner==='player' ? '#00ffff' : '#ff4422'
    let len = this.trail.length
    for(let i=0;i<len;i++){
      let t=this.trail[i]
      let frac=i/len
      let sz=Math.max(1, this.r * frac)
      ctx.globalAlpha=frac*0.55
      ctx.fillStyle=col
      ctx.fillRect(R(t.x-sz/2),R(t.y-sz/2),sz,sz)
    }
    ctx.globalAlpha=1
    ctx.fillStyle=col
    ctx.fillRect(R(this.x-this.r),R(this.y-this.r),this.r*2,this.r*2)
    ctx.fillStyle=this.owner==='player'?'#ffffff':'#ffaa00'
    ctx.fillRect(R(this.x-2),R(this.y-2),4,4)
  }
  drawSlowmoHalo(){
    if(slowmoGlowAlpha<=0 || this.pathTrail.length<2) return
    let hr=this.r+4
    let pts=this.pathTrail, headD=this._pathD
    for(let i=0;i<pts.length;i++){
      let pt=pts[i]
      let age=headD-pt.d
      let frac=1-(age/600)
      if(frac<=0) continue
      let alpha=frac*slowmoGlowAlpha*0.1
      let grd=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,hr)
      grd.addColorStop(0,  `rgba(255,255,255,0)`)
      grd.addColorStop(0.5,`rgba(255,255,255,${(alpha*0.4).toFixed(3)})`)
      grd.addColorStop(1,  `rgba(255,255,255,${alpha.toFixed(3)})`)
      ctx.globalAlpha=1
      ctx.fillStyle=grd
      ctx.beginPath();ctx.arc(pt.x,pt.y,hr,0,Math.PI*2);ctx.fill()
    }
    ctx.globalAlpha=1
  }
}
function spark(x,y,col){for(let i=0;i<5;i++)particles.push(new Particle(x,y,'spark',col))}

// ── FLYING HAT ───────────────────────────────────────────────
class FlyingHat{
  constructor(x,y,palette,bulletDx){
    this.x=x; this.y=y
    this.dx=(bulletDx>0?2:-2)+(Math.random()-0.5)*3
    this.dy=-6-Math.random()*3
    this.spin=0
    this.spinSpeed=(Math.random()-0.5)*0.25
    this.P=palette
    this.onGround=false
    this.bounces=0
  }
  update(dt){
    this.x+=this.dx*dt*timeScale
    this.dy+=0.5*dt*timeScale
    this.y+=this.dy*dt*timeScale
    this.spin+=this.spinSpeed*dt*timeScale
    if(this.y>GROUND-10){
      this.y=GROUND-10
      this.dy*=-0.4
      this.dx*=0.7
      this.spinSpeed*=0.5
      this.bounces++
    }
    if(this.x<0){this.x=0;this.dx=Math.abs(this.dx)}
    if(this.x>W-28){this.x=W-28;this.dx=-Math.abs(this.dx)}
  }
  draw(){
    let w=this.w||28
    ctx.save()
    ctx.translate(R(this.x+w/2), R(this.y))
    ctx.rotate(this.spin)
    ctx.fillStyle=this.P.hat
    // crown
    ctx.fillRect(-w/2+8,-14,w-16,16)
    // brim
    ctx.fillRect(-w/2+2,0,w-4,5)
    ctx.fillRect(-w/2,  -2,4,4)
    ctx.fillRect( w/2-4,-2,4,4)
    ctx.fillRect(-w/2-2,-4,4,4)
    ctx.fillRect( w/2-2,-4,4,4)
    // hatband
    ctx.fillStyle=this.P.hatband
    ctx.fillRect(-w/2+8,-2,w-16,3)
    ctx.restore()
  }
}
let flyingHats=[]

// ── FLYING GUN ───────────────────────────────────────────────
class FlyingGun{
  constructor(x,y,dirX){
    this.x=x; this.y=y
    this.dx=(dirX>0?3:-3)+(Math.random()-0.5)*3
    this.dy=-5-Math.random()*4
    this.spin=0
    this.spinSpeed=(Math.random()*0.18+0.08)*(dirX>0?1:-1)
  }
  update(dt){
    this.dy+=0.7*dt*timeScale
    this.x+=this.dx*dt*timeScale
    this.y+=this.dy*dt*timeScale
    this.spin+=this.spinSpeed*dt*timeScale
    let ground=GROUND-10
    if(this.y>=ground){
      this.y=ground
      this.dy=0; this.dx*=0.7; this.spinSpeed=0
    }
    if(this.x<0){this.x=0;this.dx=Math.abs(this.dx)}
    if(this.x>W-50){this.x=W-50;this.dx=-Math.abs(this.dx)}
  }
  draw(){
    ctx.save()
    ctx.translate(R(this.x),R(this.y))
    ctx.rotate(this.spin)
    // gun sprite (same as player gun, centered)
    ctx.fillStyle='#e8dfc0';ctx.fillRect(-6,2,14,14)   // grip
    ctx.fillStyle='#c8b890';ctx.fillRect(-4,4,4,4);ctx.fillRect(-4,10,4,4)
    ctx.fillStyle='#aaaaaa';ctx.fillRect(-8,-7,38,12)   // slide
    ctx.fillStyle='#cccccc';ctx.fillRect(-6,-7,36,5)
    ctx.fillStyle='#555';ctx.fillRect(6,-6,10,4)        // port
    ctx.fillStyle='#999';ctx.fillRect(-8,-8,5,5)        // hammer
    ctx.fillStyle='#333';ctx.fillRect(-6,4,12,5);ctx.fillRect(-6,9,3,4) // guard
    ctx.restore()
  }
}
let flyingGuns=[]

// ── PLAYER ───────────────────────────────────────────────────
class Player{
  constructor(x,facing,palette){
    this.x=x;this.y=SPRITE_GROUND
    this.w=32;this.h=64
    this.vy=0;this.onGround=true
    this.angle=0;this.facing=facing
    this.ammo=6;this.maxAmmo=6
    this.lives=3;this.invincible=0
    this.walkFrame=0;this.walkTimer=0;this.moving=false
    this.reloading=false;this.reloadTimer=0
    this.P=palette
    this.hasHat=true
    this.hairStyle=Math.floor(seededRand()*15)  // 0–14
    // ragdoll
    this.dead=false; this.deadVy=0; this.deadAngle=0; this.deadSpin=0
  }
  draw(){

  update(dt){
    this.moving=false
    if(keys['KeyA']||keys['ArrowLeft']) {this.x-=4*dt*timeScale;this.moving=true}
    if(keys['KeyD']||keys['ArrowRight']){this.x+=4*dt*timeScale;this.moving=true}
    if((keys['Space']||keys['ArrowUp'])&&this.onGround){this.vy=-13;this.onGround=false}
    if(this.moving){this.walkTimer+=dt*timeScale;this.walkFrame=this.walkTimer*0.2}
    this.vy+=0.65*dt*timeScale;this.y+=this.vy*dt*timeScale
    if(this.y>=SPRITE_GROUND){this.y=SPRITE_GROUND;this.vy=0;this.onGround=true}
    this.x=Math.max(0,Math.min(W-this.w,this.x))
    if(this.invincible>0)this.invincible-=dt*timeScale
    if(this.reloading){this.reloadTimer-=dt;if(this.reloadTimer<=0){this.ammo=this.maxAmmo;this.reloading=false}}
    if(this.ammo<=0&&!this.reloading){this.reloading=true;this.reloadTimer=60}
  }
  updateRagdoll(dt){
    this.deadVy+=1.0*dt*timeScale
    this.y+=this.deadVy*dt*timeScale
    // horizontal drift limited to 10px total
    let driftDir=this.deadTargetAngle>0?1:-1
    if(Math.abs(this.deadDriftX)<10){
      let step=driftDir*0.8*dt*timeScale
      this.deadDriftX+=step
      this.x+=step
    }
    // rotate toward target angle smoothly, then lock
    let diff=this.deadTargetAngle-this.deadAngle
    if(Math.abs(diff)>0.01){
      this.deadAngle+=diff*0.10*dt*timeScale
    } else {
      this.deadAngle=this.deadTargetAngle
    }
    // one small bounce then stop
    let ground=SPRITE_GROUND+this.h*0.55
    if(this.y>=ground){
      this.y=ground
      if(!this.deadBounced){
        this.deadBounced=true
        if(this.deadVy>1){ this.deadVy=-5 }
        else { this.deadVy=0 }
      } else {
        this.deadVy=0
      }
    }
  }
  gunTip(){let ax=this.x+(this.facing>0?this.w:0),ay=this.y+30;return{x:ax+Math.cos(this.angle)*44,y:ay+Math.sin(this.angle)*44}}
}

class Enemy extends Player{
  constructor(x,facing,palette){super(x,facing,palette);this.aimNoise=0;this.shootCooldown=30}
  updateAI(dt,target){
    if(gameOver)return
    let ax=this.x+this.w/2,ay=this.y+30,tx=target.x+target.w/2,ty=target.y+30
    let ideal=Math.atan2(ty-ay,tx-ax)
    this.aimNoise+=(Math.random()-0.5)*0.08;this.aimNoise*=0.9;this.angle=ideal+this.aimNoise
    this.moving=false
    let distToPlayer=Math.abs(ax-tx),preferredDist=W*0.38,halfField=W*0.5
    for(let b of bullets){
      if(b.owner==='player'){
        let dx=b.x-this.x,dy=b.y-this.y
        if(Math.sqrt(dx*dx+dy*dy)<250){this.x+=(b.dx<0?3:-3)*dt*timeScale;this.moving=true;if(this.onGround&&Math.random()<0.02){this.vy=-13;this.onGround=false}}
      }
    }
    if(this.x+this.w/2<halfField){this.x+=2.5*dt*timeScale;this.moving=true}
    if(distToPlayer<preferredDist&&tx<ax){this.x+=2*dt*timeScale;this.moving=true}
    if(distToPlayer>preferredDist*1.6&&this.x+this.w/2>halfField){this.x-=1*dt*timeScale;this.moving=true}
    if(this.x<halfField-this.w)this.x=halfField-this.w
    this.shootCooldown-=dt*timeScale
    if(this.shootCooldown<=0&&this.ammo>0&&!this.reloading){this.shootCooldown=25+Math.random()*30;shoot(this,'enemy')}
  }
}

// ── SEEDED RNG (mulberry32) ───────────────────────────────────
let _rngState = 0
function seedRng(seed){ _rngState = seed >>> 0 }
function seededRand(){
  _rngState |= 0; _rngState = _rngState + 0x6D2B79F5 | 0
  let t = Math.imul(_rngState ^ _rngState >>> 15, 1 | _rngState)
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t
  return ((t ^ t >>> 14) >>> 0) / 4294967296
}

function rndCol(hues){
  let h=hues[Math.floor(seededRand()*hues.length)]
  let s=50+seededRand()*40, l=30+seededRand()*30
  return `hsl(${h},${s}%,${l}%)`
}

function shoot(p,owner){
  if(p.ammo<=0||p.reloading)return
  let t=p.gunTip()
  bullets.push(new Bullet(t.x,t.y,p.angle,owner))
  p.ammo--
  flashes.push(new Flash(t.x,t.y,owner==='player'?'#00ffff':'#ff4422'))
  for(let i=0;i<4;i++)particles.push(new Particle(t.x,t.y,'spark'))
}

// ── MULTIPLAYER ──────────────────────────────────────────────
let mp = {
  ws: null, role: null, connected: false, guestReady: false,
  guestKeys: {}, guestAngle: 0, guestFacing: -1,
  stateInterval: null, overlay: null
}

function mpConnect() {
  // Determine WS URL from current page URL
  const proto = location.protocol === 'https:' ? 'wss' : 'ws'
  const wsUrl = `${proto}://${location.host}`
  mp.ws = new WebSocket(wsUrl)

  mp.ws.onopen = () => {
    mp.ws.send(JSON.stringify({ type: 'join' }))
  }

  mp.ws.onmessage = (e) => {
    let msg
    try { msg = JSON.parse(e.data) } catch { return }

    if (msg.type === 'role') {
      mp.role = msg.role
      mp.connected = true
      console.log('[MP] role assigned:', mp.role)
      if (msg.role === 'host') mpShowOverlay('🤠 You are BILLY\nWaiting for second player...')
      else mpShowOverlay('🔫 You are OUTLAW\nWaiting for host to start...')
      if (msg.role === 'guest') mpStartSendingInputs()
    }

    if (msg.type === 'guest_joined') {
      mp.guestReady = true
      mpHideOverlay()
      // Show level select to host
      levelSel.style.display = 'flex'
    }

    if (msg.type === 'start_level') {
      // Guest receives level start command from host
      mpHideOverlay()
      mp.currentSeed = msg.seed || 12345
      startGame(msg.level, false, false)  // skipNetSync=false so guest starts sending inputs
    }

    if (msg.type === 'input') {
      // Host receives guest inputs
      if (mp.role === 'host') {
        mp.guestKeys = msg.keys || {}
        mp.guestAngle = msg.angle ?? 0
        mp.guestFacing = msg.facing ?? -1
        // Debug: log when any movement key is pressed
        let gk = mp.guestKeys
        if (gk['KeyA']||gk['KeyD']||gk['ArrowLeft']||gk['ArrowRight']||gk['Space']||gk['ArrowUp']) {
          console.log('[HOST] guest keys:', JSON.stringify(gk))
        }
      }
    }

    if (msg.type === 'shoot') {
      console.log('[HOST] received shoot from guest, enemy exists:', !!enemy, 'gameOver:', gameOver)
      // Host receives shoot request from guest — fire enemy gun
      if (mp.role === 'host' && enemy && !gameOver) {
        shoot(enemy, 'enemy')
      }
    }

    if (msg.type === 'state') {
      // Guest receives full game state from host
      if (mp.role === 'guest') mpApplyState(msg.state)
    }

    if (msg.type === 'shoot_event') {
      // Guest receives shoot notification from host
      if (mp.role === 'guest' && enemy) {
        shoot(enemy, 'player')  // enemy is the guest's character on guest side
      }
    }

    if (msg.type === 'opponent_disconnected') {
      mpShowOverlay('❌ Opponent disconnected\nRefresh the page')
      gameOver = true
    }

    if (msg.type === 'game_over') {
      if (mp.role === 'guest') {
        gameOver = true
        resultEl.textContent = msg.result
        document.getElementById('retry-btn').style.display = 'none'
        document.getElementById('menu-btn').style.display = 'none'
        ui.style.display = 'block'
      }
    }

    if (msg.type === 'restart') {
      if (mp.role === 'guest') {
        ui.style.display = 'none'
        document.getElementById('retry-btn').style.display = ''
        document.getElementById('menu-btn').style.display = ''
        mp.currentSeed = msg.seed || mp.currentSeed
        startGame(msg.level, true)
      }
    }
  }

  mp.ws.onclose = () => {
    if (mp.connected) mpShowOverlay('❌ Connection lost\nRefresh the page')
  }
}

// Host serialises game state and sends to guest ~20fps
let _lastParticleCount = 0

function mpSendState() {
  if (!player || !enemy) return
  // Collect particles spawned since last snapshot
  let newParticles = []
  if (particles.length > _lastParticleCount) {
    newParticles = particles.slice(_lastParticleCount).map(p=>({
      x:p.x, y:p.y, dx:p.dx, dy:p.dy, life:p.life, size:p.size, color:p.color, type:p.type
    }))
  }
  _lastParticleCount = particles.length
  const state = {
    p:  { x:player.x, y:player.y, vy:player.vy, angle:player.angle, facing:player.facing,
          lives:player.lives, ammo:player.ammo, reloading:player.reloading, reloadTimer:player.reloadTimer,
          hasHat:player.hasHat, dead:player.dead, deadAngle:player.deadAngle, invincible:player.invincible,
          moving:player.moving, walkFrame:player.walkFrame,
          deadVy:player.deadVy, deadBounced:player.deadBounced, deadDriftX:player.deadDriftX, deadTargetAngle:player.deadTargetAngle,
          hairStyle:player.hairStyle, P:player.P },
    e:  { x:enemy.x,  y:enemy.y,  vy:enemy.vy,  angle:enemy.angle,  facing:enemy.facing,
          lives:enemy.lives,  ammo:enemy.ammo,  reloading:enemy.reloading, reloadTimer:enemy.reloadTimer,
          hasHat:enemy.hasHat, dead:enemy.dead, deadAngle:enemy.deadAngle, invincible:enemy.invincible,
          moving:enemy.moving, walkFrame:enemy.walkFrame,
          deadVy:enemy.deadVy, deadBounced:enemy.deadBounced, deadDriftX:enemy.deadDriftX, deadTargetAngle:enemy.deadTargetAngle,
          hairStyle:enemy.hairStyle, P:enemy.P },
    bullets: bullets.map(b=>({x:b.x,y:b.y,dx:b.dx,dy:b.dy,owner:b.owner,trail:b.trail.slice()})),
    flyingHats: flyingHats.map(h=>({x:h.x,y:h.y,dx:h.dx,dy:h.dy,spin:h.spin})),
    flyingGuns: flyingGuns.map(g=>({x:g.x,y:g.y,spin:g.spin})),
    go: gameOver, ts: timeScale, se: slowEnergy,
    particles: newParticles
  }
  mp.ws.send(JSON.stringify({ type:'state', state }))
}

function mpApplyState(s) {
  if (!player || !enemy) return

  // Player (host's character): apply fully, but once dead keep ragdoll local
  let wasPlayerDead = player.dead
  let savedP = wasPlayerDead ? {x:player.x,y:player.y,deadVy:player.deadVy,deadAngle:player.deadAngle,deadBounced:player.deadBounced,deadDriftX:player.deadDriftX} : null
  Object.assign(player, s.p)
  if (wasPlayerDead && player.dead && savedP) {
    player.x=savedP.x; player.y=savedP.y
    player.deadVy=savedP.deadVy; player.deadAngle=savedP.deadAngle
    player.deadBounced=savedP.deadBounced; player.deadDriftX=savedP.deadDriftX
  }

  // Enemy (guest's character): preserve angle/facing + ragdoll once dead
  let localAngle = enemy.angle, localFacing = enemy.facing
  let wasEnemyDead = enemy.dead
  let savedE = wasEnemyDead ? {x:enemy.x,y:enemy.y,deadVy:enemy.deadVy,deadAngle:enemy.deadAngle,deadBounced:enemy.deadBounced,deadDriftX:enemy.deadDriftX} : null
  Object.assign(enemy, s.e)
  enemy.angle = localAngle
  enemy.facing = localFacing
  if (wasEnemyDead && enemy.dead && savedE) {
    enemy.x=savedE.x; enemy.y=savedE.y
    enemy.deadVy=savedE.deadVy; enemy.deadAngle=savedE.deadAngle
    enemy.deadBounced=savedE.deadBounced; enemy.deadDriftX=savedE.deadDriftX
  }

  gameOver = s.go
  timeScale = s.ts
  slowEnergy = s.se

  // Sync bullets
  bullets = s.bullets.map(b => {
    let bl = new Bullet(b.x, b.y, 0, b.owner)
    bl.dx = b.dx; bl.dy = b.dy
    bl.trail = b.trail || []
    return bl
  })

  // Sync new particles from host
  if (s.particles) {
    for (let sp of s.particles) {
      let p = new Particle(sp.x, sp.y, sp.type || 'spark', sp.color)
      p.dx = sp.dx; p.dy = sp.dy; p.life = sp.life; p.size = sp.size
      particles.push(p)
    }
  }
}

// Guest sends inputs to host ~30fps
let mpInputInterval = null
function mpStartSendingInputs() {
  if (mpInputInterval) clearInterval(mpInputInterval)
  console.log('[GUEST] starting to send inputs')
  mpInputInterval = setInterval(() => {
    if (!mp.ws || mp.ws.readyState !== 1) return
    const payload = {
      type: 'input',
      keys: {...keys},
      angle: enemy?.angle ?? 0,
      facing: enemy?.facing ?? -1
    }
    // Debug: log when sending movement keys
    if (keys['KeyA']||keys['KeyD']||keys['ArrowLeft']||keys['ArrowRight']||keys['Space']||keys['ArrowUp']) {
      console.log('[GUEST] sending keys:', JSON.stringify(keys))
    }
    mp.ws.send(JSON.stringify(payload))
  }, 33)
}

// Called by host when level starts to tell guest which level
function mpNotifyLevelStart(level) {
  if (mp.role === 'host' && mp.ws?.readyState === 1) {
    mp.ws.send(JSON.stringify({ type: 'start_level', level, seed: mp.currentSeed }))
    // Begin sending state snapshots
    if (mp.stateInterval) clearInterval(mp.stateInterval)
    mp.stateInterval = setInterval(mpSendState, 16)  // ~60fps fallback
  }
}

// ── COLLISION ────────────────────────────────────────────────
function rectHit(b,p){return b.x>p.x&&b.x<p.x+p.w&&b.y>p.y&&b.y<p.y+p.h}
function bHit(a,b){let dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy<(a.r+b.r)*(a.r+b.r)}

// ── SLOWMO ───────────────────────────────────────────────────
function updateSlowmo(dt){
  let active = keys['KeyE'] || !player.onGround
  if (mp.connected && mp.role === 'host' && enemy) {
    active = active || mp.guestKeys['KeyE'] || !enemy.onGround
  }
  if(active&&slowEnergy>0){isSlowmo=true;slowEnergy=Math.max(0,slowEnergy-SLOW_DRAIN*dt);timeScale=SLOW_SCALE}
  else{isSlowmo=false;slowEnergy=Math.min(1,slowEnergy+SLOW_REFILL*dt);timeScale=1}
  if(slowEnergy<=0){isSlowmo=false;timeScale=1}
  let target=isSlowmo?1:0
  slowmoGlowAlpha+=(target-slowmoGlowAlpha)*0.08*dt
  if(slowmoGlowAlpha<0.005) slowmoGlowAlpha=0
}

function takeHit(p,isPlayer,bulletDx){
  if(p.invincible>0)return
  p.lives--;p.invincible=70
  let cx=p.x+p.w/2,cy=p.y+p.h/2
  // blood burst particles
  for(let i=0;i<28;i++){
    let bp=new Particle(cx,cy,'death')
    bp.color=Math.random()<0.5?'#cc0011':Math.random()<0.6?'#ff0022':'#990011'
    bp.size=1+Math.random()*5
    bp.life=1
    bp.dx += -bulletDx*(0.5+Math.random()*3)
    particles.push(bp)
  }
  // blood drops settling on surfaces
  let dropCount=p.lives<=0?22:12
  for(let i=0;i<dropCount;i++) bloodDrops.push(new BloodDrop(cx,cy,bulletDx>0?1:-1))
  if(p.lives<=0){
    p.dead=true
    p.deadVy=-6
    p.deadBounced=false
    p.deadDriftX=0
    p.deadTargetAngle=(bulletDx>0?1:-1)*Math.PI/2
    p.deadAngle=0
    let gt=p.gunTip()
    flyingGuns.push(new FlyingGun(gt.x, gt.y, bulletDx>0?1:-1))
    setTimeout(()=>endGame(isPlayer?'DEFEAT':'VICTORY'), 1400)
  }
}

// ── MAIN LOOP ────────────────────────────────────────────────
let lastTime=performance.now()
let glowT=0

function loop(now){
  let dt=Math.min((now-lastTime)/16.67,3); lastTime=now
  glowT+=dt*0.05

  updateSlowmo(dt)

  // draw bg per level
  if(currentLevel===1) drawWildWest()
  else if(currentLevel===2) drawNeonCity(glowT)
  else if(currentLevel===3) drawMars(glowT)

  // level-specific animated elements
  if(currentLevel===1){ for(let c of clouds){c.update(dt);c.draw()} }
  if(currentLevel===3){ for(let a of aliens){a.update(dt);a.draw()} }

  if (mp.connected && mp.role === 'guest') {
    // Guest: no position prediction — position comes from host snapshots
    // Only update bullets/particles locally for smooth rendering between snapshots
    for(let b of bullets) b.update(dt)
    for(let p of particles) p.update(dt)
    particles = particles.filter(p=>p.life>0)
    for(let h of flyingHats) h.update(dt)
    for(let g of flyingGuns) g.update(dt)
  } else {
    // Host (or single player): run full physics
    // MP host: apply guest inputs to enemy instead of AI
    if (mp.connected && mp.role === 'host' && enemy) {
      enemy.angle  = mp.guestAngle
      enemy.facing = mp.guestFacing
      if (!enemy.dead) {
        let gk = mp.guestKeys
        enemy.moving = false
        if (gk['KeyA']||gk['ArrowLeft'])  { enemy.x -= 4*dt*timeScale; enemy.moving = true }
        if (gk['KeyD']||gk['ArrowRight']) { enemy.x += 4*dt*timeScale; enemy.moving = true }
        if ((gk['Space']||gk['ArrowUp']) && enemy.onGround) { enemy.vy = -13; enemy.onGround = false }
        if (enemy.moving){ enemy.walkTimer+=dt*timeScale; enemy.walkFrame=enemy.walkTimer*0.2 }
        enemy.vy+=0.65*dt*timeScale; enemy.y+=enemy.vy*dt*timeScale
        if(enemy.y>=SPRITE_GROUND){enemy.y=SPRITE_GROUND;enemy.vy=0;enemy.onGround=true}
        enemy.x=Math.max(0,Math.min(W-enemy.w,enemy.x))
        if(enemy.invincible>0) enemy.invincible-=dt*timeScale
        if(enemy.reloading){enemy.reloadTimer-=dt;if(enemy.reloadTimer<=0){enemy.ammo=enemy.maxAmmo;enemy.reloading=false}}
        if(enemy.ammo<=0&&!enemy.reloading){enemy.reloading=true;enemy.reloadTimer=60}
      }
    } else {
      // single player: normal update + AI
      if(!enemy.dead) enemy.update(dt)
      if(!gameOver && !enemy.dead) enemy.updateAI(dt,player)
    }

    // always update player
    if(!player.dead) player.update(dt)

  let dead=new Set()
  for(let i=0;i<bullets.length;i++){
    if(dead.has(i))continue
    for(let j=i+1;j<bullets.length;j++){
      if(dead.has(j))continue
      if(bullets[i].owner!==bullets[j].owner&&bHit(bullets[i],bullets[j])){
        dead.add(i);dead.add(j)
        let mx=(bullets[i].x+bullets[j].x)/2,my=(bullets[i].y+bullets[j].y)/2
        for(let k=0;k<10;k++)particles.push(new Particle(mx,my,'spark'))
        flashes.push(new Flash(mx,my,'#ffffff'))
      }
    }
  }
  bullets=bullets.filter((b,idx)=>{
    if(dead.has(idx))return false
    b.update(dt)
    if(!gameOver){
      // hat hit check — hat zone: above py, roughly crown area
      if(b.owner!=='player'&&player.hasHat){
        let hp=player, hx=hp.x, hy=hp.y
        if(b.x>hx&&b.x<hx+hp.w&&b.y>hy-18&&b.y<hy+2){
          player.hasHat=false
          flyingHats.push(new FlyingHat(hx,hy-14,player.P,b.dx))
          for(let k=0;k<6;k++)particles.push(new Particle(hx+16,hy-8,'spark','#FFD700'))
          return false
        }
      }
      if(b.owner!=='enemy'&&enemy.hasHat){
        let hp=enemy, hx=hp.x, hy=hp.y
        if(b.x>hx&&b.x<hx+hp.w&&b.y>hy-18&&b.y<hy+2){
          enemy.hasHat=false
          flyingHats.push(new FlyingHat(hx,hy-14,enemy.P,b.dx))
          for(let k=0;k<6;k++)particles.push(new Particle(hx+16,hy-8,'spark','#cc4444'))
          return false
        }
      }
      if(b.owner!=='player'&&rectHit(b,player)){takeHit(player,true,b.dx);return false}
      if(b.owner!=='enemy' &&rectHit(b,enemy)) {takeHit(enemy,false,b.dx);return false}
    }
    return true
  })
  } // end host-only physics block

  // Host: send state every frame for minimal latency
  if (mp.connected && mp.role === 'host') mpSendState()

  if (mp.connected && mp.role === 'guest') {
    // already updated in prediction block above — just draw
    particles = particles.filter(p=>{p.draw();return p.life>0})
    flashes   = flashes  .filter(f=>{f.update(dt);f.draw();return f.life>0})
    flyingHats.forEach(h=>h.draw())
    flyingGuns.forEach(g=>g.draw())
  } else {
    particles=particles.filter(p=>{p.update(dt);p.draw();return p.life>0})
    flashes  =flashes  .filter(f=>{f.update(dt);f.draw();return f.life>0})
    flyingHats.forEach(h=>{h.update(dt);h.draw()})
    flyingGuns.forEach(g=>{g.update(dt);g.draw()})
  }
  // ragdoll physics — run on both host and guest locally
  if(player&&player.dead) player.updateRagdoll(dt)
  if(enemy &&enemy.dead)  enemy.updateRagdoll(dt)
  enemy.draw();player.draw()
  if(slowmoGlowAlpha>0) for(let b of bullets) b.drawSlowmoHalo()
  for(let b of bullets)b.draw()
  drawBloodStains()
  bloodDrops=bloodDrops.filter(b=>{b.update(dt);if(!b.settled){b.draw();return true}return false})

  if(isSlowmo){ctx.strokeStyle='rgba(0,220,255,0.25)';ctx.lineWidth=8;ctx.strokeRect(4,4,W-8,H-8)}
  drawHUD()
  requestAnimationFrame(loop)
}

// ── START LEVEL ──────────────────────────────────────────────
function startGame(level, isRetry=false, skipNetSync=false){
  currentLevel=level
  levelSel.style.display='none'
  bullets=[];particles=[];flashes=[];obstacles=[];clouds=[];aliens=[];flyingHats=[];flyingGuns=[];bloodDrops=[];bloodStains=[]
  _lastParticleCount = 0
  timeScale=1;slowEnergy=1;isSlowmo=false;gameOver=false;slowmoGlowAlpha=0

  if(!isRetry){
    // Host generates seed; guest receives it via start_level message before startGame is called
    if(!mp.connected || mp.role === 'host'){
      mp.currentSeed = Math.floor(Math.random() * 0xFFFFFFFF)
    }
    seedRng(mp.currentSeed || 12345)
    randomisePalettes()
    playerName=PLAYER_NAMES[Math.floor(seededRand()*PLAYER_NAMES.length)]
    enemyName=ENEMY_NAMES[Math.floor(seededRand()*ENEMY_NAMES.length)]
    // hairStyle is picked inside Player/Enemy constructor via seededRand — RNG state continues here
  }

  player=new Player(150,   1, playerPalette)
  enemy =new Enemy(W-200, -1, enemyPalette)

  if(level===1){
    clouds=[
      new Cloud(120, 200, 90,  45, 0.25),
      new Cloud(420, 300, 70,  35, 0.15),
      new Cloud(720, 230, 110, 50, 0.20),
      new Cloud(1050,340, 80,  38, 0.18),
      new Cloud(300, 280, 65,  32, 0.22),
      new Cloud(900, 260, 95,  42, 0.12),
    ]
  }

  if(level===2){
    let posts=[W*0.18,W*0.38,W*0.62,W*0.82]
    for(let lx of posts){
      obstacles.push({x:lx-4,y:GROUND-180,w:54,h:8})
      obstacles.push({x:lx+44,y:GROUND-192,w:16,h:18})
    }
  }

  if(level===3){
    let alienData=[[W*0.2,H*0.38,0.8],[W*0.55,H*0.44,-0.6],[W*0.75,H*0.36,0.5],[W*0.35,H*0.50,-0.7]]
    for(let [ax,ay,spd] of alienData){
      let a=new Alien(ax,ay,spd)
      a.obs={x:ax,y:ay,w:120,h:60}
      obstacles.push(a.obs)
      aliens.push(a)
    }
  }

  // MP: host tells guest to start, guest starts sending inputs
  if (mp.connected && !skipNetSync) {
    if (mp.role === 'host') mpNotifyLevelStart(level)
    if (mp.role === 'guest') mpStartSendingInputs()
  }

  lastTime=performance.now()
  requestAnimationFrame(loop)
}

function restartLevel(){
  ui.style.display='none'
  // In MP: host sends restart signal to guest
  if(mp.connected && mp.role==='host' && mp.ws?.readyState===1){
    mp.ws.send(JSON.stringify({type:'restart', level: currentLevel, seed: mp.currentSeed}))
  }
  startGame(currentLevel, true)
}
function endGame(text){
  if(gameOver)return;gameOver=true
  if(player&&enemy&&player.dead&&enemy.dead) text='DEAD HEAT'
  resultEl.textContent=text;ui.style.display='block'
  if(mp.connected && mp.role==='host' && mp.ws?.readyState===1){
    let guestResult = text==='DEAD HEAT' ? 'DEAD HEAT' : (text==='VICTORY' ? 'DEFEAT' : 'VICTORY')
    mp.ws.send(JSON.stringify({type:'game_over', result: guestResult}))
  }
}

    x.fillStyle='#44ee88';x.fillRect(70,22,50,10);x.fillRect(80,15,30,10)
